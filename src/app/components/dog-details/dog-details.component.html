<div class="dog-details-section">

  <div class="header-flexbox" style="padding-top: 10px; padding-bottom: 10px;">
    <!--The left-hand-side-->
    <div>
       <!--This is the LHS if NOT in edit mode -->
       @if (editStatus==false) {
         @if (isFullScreen==true) {
          <button (click)="backClicked()" class="circle">
            <i>arrow_back</i>
          </button>
        }
       }
       <!--This is the LHS if in edit mode -->
       @if (editStatus==true) {
        <button (click)="cancelClicked()" class="circle">
          <i>Close</i>
        </button>
      }
    </div>

    <!--The middle-->

    <div>
      @if (!errorDog) {
      <input
        style="background-color: var(--surface-variant)"
        [style.--label-colour]="labelColourDogName()"
        class="dogNameInput myedit"
        placeholder={{labels.dogName}}
        type="text"
        [(ngModel)]="displayedDog.dogname"
        [readonly]="editStatus === false">
      }
      @else {
        <p
        style="background-color: var(--surface-variant)"
        class="dogNameInput myedit">
        Loading ...
        </p>
      }
    </div>


    <!--The right-hand-side-->
    <div>
    <!--This is the RHS if NOT in edit mode -->
      @if (editStatus==false) {
          <button (click)="editClicked()" class = "circle">
            <i>Edit</i>
          </button>
      }
    <!--This is the RHS if in edit mode -->
    @if (editStatus==true) {
      <button (click)="saveClicked()" class="no-padding">
        <i>Done</i>
      </button>
    }

  </div>
</div>

<div class="img_text_container">
  <div class="image">
    <img alt="Cocker" src="IMG_2983.jpeg" class="center" style="width:280px; height:auto;">
  </div>
  <!--div class="space"></div-->

  <!--div>{{chosenDog.appointments.appointmentList[0].groomType}}</div-->
  <div class="right_of_img responsive">
    <app-enter-contact [(displayedOwner)]="displayedOwner" [editStatus]="editStatus" [labels]="labels"></app-enter-contact>
  </div>
</div>

</div>

<!--This modal box is enabled if there is a save warning-->
@if (saveWarning) {
  <div class="modal-overlay" (click)="closeSaveWarningModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <h6>Save Warning</h6>
      <p>{{saveWarningMessage}}</p>
      <button (click)="closeSaveWarningModal()">Close</button>
    </div>
  </div>
}
